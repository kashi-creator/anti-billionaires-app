{% extends "base.html" %}
{% block title %}Post a Deal{% endblock %}

{% block content %}
<div class="page-container page-narrow">
    <h1>Post a Deal</h1>
    <form method="POST" enctype="multipart/form-data" class="form-card">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" class="input-field" required placeholder="What's the deal?">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="input-field" rows="4" placeholder="Details about this opportunity..."></textarea>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select name="category" class="input-field">
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat|capitalize }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Link (optional)</label>
            <input type="url" name="link" class="input-field" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Image (optional)</label>
            <input type="file" name="image" accept="image/*" class="input-field">
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%">Post Deal</button>
    </form>
</div>
{% endblock %}
