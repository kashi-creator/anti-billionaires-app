{% extends "emails/_layout.html" %}
{% block content %}
<h1 style="font-family:Georgia,serif;font-size:24px;color:#D4AF37;margin:0 0 16px 0;">Payment didn't go through</h1>
<p>Hi {{ user.name }} — we tried to charge your card but it was declined.</p>
<p>Update your payment method to keep your access active. Stripe will retry automatically.</p>
<p style="margin:32px 0;text-align:center;">
  <a href="{{ update_url }}" style="display:inline-block;background:#D4AF37;color:#0A0A0A;padding:14px 32px;text-decoration:none;font-weight:bold;letter-spacing:1px;text-transform:uppercase;font-size:13px;border-radius:4px;">Update Payment</a>
</p>
{% endblock %}
