{% extends "emails/_layout.html" %}
{% block content %}
<h1 style="font-family:Georgia,serif;font-size:24px;color:#D4AF37;margin:0 0 16px 0;">Welcome, {{ user.name }}.</h1>
<p>Your membership is active. One last step: confirm your email so we know it's really you.</p>
<p style="margin:32px 0;text-align:center;">
  <a href="{{ verify_url }}" style="display:inline-block;background:#D4AF37;color:#0A0A0A;padding:14px 32px;text-decoration:none;font-weight:bold;letter-spacing:1px;text-transform:uppercase;font-size:13px;border-radius:4px;">Confirm Email</a>
</p>
<p style="font-size:13px;color:#888;">Or paste this link in your browser:<br><span style="color:#D4AF37;word-break:break-all;">{{ verify_url }}</span></p>
<p style="font-size:13px;color:#888;">This link is valid for 7 days.</p>
{% endblock %}
