{% extends "emails/_layout.html" %}
{% block content %}
<h1 style="font-family:Georgia,serif;font-size:24px;color:#D4AF37;margin:0 0 16px 0;">Reset your password</h1>
<p>Hi {{ user.name }} — we got a request to reset your password.</p>
<p style="margin:32px 0;text-align:center;">
  <a href="{{ reset_url }}" style="display:inline-block;background:#D4AF37;color:#0A0A0A;padding:14px 32px;text-decoration:none;font-weight:bold;letter-spacing:1px;text-transform:uppercase;font-size:13px;border-radius:4px;">Reset Password</a>
</p>
<p style="font-size:13px;color:#888;">Or paste this in your browser:<br><span style="color:#D4AF37;word-break:break-all;">{{ reset_url }}</span></p>
<p style="font-size:13px;color:#888;">Link valid for 1 hour. Didn't request this? Ignore this email.</p>
{% endblock %}
