<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>{{ subject }}</title></head>
<body style="margin:0;padding:0;background:#0A0A0A;font-family:Georgia,'Cormorant Garamond',serif;color:#E8E8E8;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0A0A0A;padding:48px 16px;">
  <tr><td align="center">
    <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;background:#111111;border:1px solid #2a2a2a;border-radius:8px;">
      <tr><td style="padding:32px 40px 24px 40px;text-align:center;border-bottom:1px solid #1f1f1f;">
        <img src="{{ url_for('static', filename='img/sovereign-logo.png', _external=True) }}" alt="Sovereign Society" width="84" height="84" style="display:inline-block;border-radius:10px;border:0;outline:none;text-decoration:none;">
        <div style="margin-top:14px;font-family:Georgia,serif;font-size:13px;letter-spacing:4px;color:#D4AF37;text-transform:uppercase;font-weight:600;">Sovereign Society</div>
      </td></tr>
      <tr><td style="padding:32px 40px;font-size:16px;line-height:1.6;color:#E8E8E8;">
        {% block content %}{% endblock %}
      </td></tr>
      <tr><td style="padding:24px 40px;border-top:1px solid #1f1f1f;text-align:center;font-size:12px;color:#666;">
        Sovereign Society &nbsp;&middot;&nbsp; <a href="{{ url_for('feed', _external=True) }}" style="color:#D4AF37;text-decoration:none;">sovereignsociety.rich</a>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
