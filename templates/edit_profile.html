{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Edit Profile</h1>
        </div>
        <form method="POST" enctype="multipart/form-data" class="auth-form">
            <div class="form-group" style="text-align:center">
                <div class="avatar avatar-xl" style="margin:0 auto 1rem">
                    {% if current_user.profile_photo %}
                    <img src="{{ url_for('static', filename=current_user.profile_photo) }}" alt="">
                    {% else %}
                    <span>{{ current_user.name[0]|upper }}</span>
                    {% endif %}
                </div>
                <label class="file-upload" for="profile_photo" style="display:inline-flex">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span>Change Photo</span>
                </label>
                <input type="file" id="profile_photo" name="profile_photo" accept="image/*" hidden>
            </div>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{ current_user.name }}" required>
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="3" placeholder="Tell the club about yourself...">{{ current_user.bio or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-gold btn-full">Save Changes</button>
            <a href="{{ url_for('profile', user_id=current_user.id) }}" class="btn btn-ghost btn-full" style="margin-top:0.5rem">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
