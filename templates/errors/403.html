{% extends "base.html" %}
{% block title %}403 - Forbidden{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">403</div>
    <h1>Access Denied</h1>
    <p>You don't have permission to access this area. Level up to unlock more of the club.</p>
    <a href="{{ url_for('feed') if current_user.is_authenticated else url_for('pricing') }}" class="btn btn-gold" style="margin-top:2rem">Back to Base</a>
</div>
{% endblock %}
