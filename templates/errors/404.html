{% extends "base.html" %}
{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. No shortcuts on the road to the top.</p>
    <a href="{{ url_for('feed') if current_user.is_authenticated else url_for('pricing') }}" class="btn btn-gold" style="margin-top:2rem">Back to Base</a>
</div>
{% endblock %}
