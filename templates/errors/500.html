{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">500</div>
    <h1>Something Went Wrong</h1>
    <p>Even the best players fumble sometimes. We're on it. Try again in a moment.</p>
    <a href="{{ url_for('feed') if current_user.is_authenticated else url_for('pricing') }}" class="btn btn-gold" style="margin-top:2rem">Back to Base</a>
</div>
{% endblock %}
