{% extends "base.html" %}
{% block title %}Create Space{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create a Space</h1>
            <p class="auth-subtitle">Build a sub-community for the club</p>
        </div>
        <form method="POST" enctype="multipart/form-data" class="auth-form">
            <div class="form-group">
                <label for="name">Space Name</label>
                <input type="text" id="name" name="name" placeholder="e.g. Investing Talk" required>
            </div>
            <div class="form-group">
                <label for="description">Description <span class="optional">(optional)</span></label>
                <textarea id="description" name="description" rows="3" placeholder="What's this space about?"></textarea>
            </div>
            <div class="form-group">
                <label for="cover_image">Cover Image <span class="optional">(optional)</span></label>
                <label class="file-upload" for="cover_image" style="display:inline-flex">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span>Upload Cover</span>
                </label>
                <input type="file" id="cover_image" name="cover_image" accept="image/*" hidden>
            </div>
            <button type="submit" class="btn btn-gold btn-full">Create Space</button>
            <a href="{{ url_for('spaces') }}" class="btn btn-ghost btn-full" style="margin-top:0.5rem">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
