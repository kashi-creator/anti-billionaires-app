{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="{{ url_for('static', filename='img/sovereign-logo.png') }}" alt="Sovereign Society" class="auth-logo-img">
            </div>
            <h1>Reset Your Password</h1>
            <p class="auth-subtitle">We'll email you a reset link</p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <button type="submit" class="btn btn-gold btn-full">Send reset link</button>
        </form>
        <div class="auth-footer">
            <p><a href="{{ url_for('login') }}">Back to sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
