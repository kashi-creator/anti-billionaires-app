{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="{{ url_for('static', filename='img/sovereign-logo.png') }}" alt="Sovereign Society" class="auth-logo-img">
            </div>
            <h1>Set a New Password</h1>
            <p class="auth-subtitle">Choose something memorable</p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">New password</label>
                <input type="password" id="password" name="password" required placeholder="Min 10 characters" minlength="10" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm" minlength="10" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-gold btn-full">Update password</button>
        </form>
        <div class="auth-footer">
            <p><a href="{{ url_for('login') }}">Back to sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
